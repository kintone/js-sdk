packages:
  - "packages/**"
  - "!**/lib/**"
  - "!**/esm/**"
  - "!**/templates/**"

overrides:
  "@isaacs/brace-expansion": "5.0.1"
  "body-parser": ">=1.20.5"
  "braces": ">=3.0.3"
  "browserify-sign@<4.2.2": ">=4.2.6"
  "cross-spawn": ">=7.0.6"
  "express": ">=4.19.2"
  "follow-redirects@<1.15.4": ">=1.15.11"
  "pac-resolver": ">=7.0.1"
  "socks": ">=2.8.9"
  "ws": ">=8.18.3"

allowBuilds:
  core-js: true
  esbuild: true
  puppeteer: true
  unrs-resolver: true

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  # Renovate security update: lodash@4.17.23 || 4.18.1
  - lodash@4.17.23 || 4.18.1
  # Renovate security update: webpack@5.104.1
  - webpack@5.104.1
  # Renovate security update: qs@6.14.2
  - qs@6.14.2
  # Renovate security update: yauzl@3.2.1
  - yauzl@3.2.1
