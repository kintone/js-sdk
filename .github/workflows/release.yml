# WARNING: When you rename a workflow filename, remember to update the Trusted Publishing settings as well.
# - https://www.npmjs.com/package/@kintone/webpack-plugin-kintone-plugin/access
# - https://www.npmjs.com/package/@kintone/plugin-uploader/access
# - https://www.npmjs.com/package/@kintone/create-plugin/access
# - https://www.npmjs.com/package/@kintone/plugin-manifest-validator/access
# - https://www.npmjs.com/package/@kintone/plugin-packer/access
# - https://www.npmjs.com/package/@kintone/customize-uploader/access
# - https://www.npmjs.com/package/@kintone/dts-gen/access
# - https://www.npmjs.com/package/@kintone/rest-api-client/access
# - https://www.npmjs.com/package/@kintone/eslint-plugin/access
# - https://www.npmjs.com/package/@kintone/rest/access
# ref. https://docs.npmjs.com/trusted-publishers

name: Release
on:
  push:
    branches:
      - main

jobs:
  release:
    name: Create release
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: create-iat
        with:
          app-id: ${{ secrets.RELEASE_GITHUB_APP_ID}}
          private-key: ${{ secrets.RELEASE_GITHUB_APP_KEY }}
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        id: release
        with:
          token: ${{ steps.create-iat.outputs.token }}

      # release-please's extra-files cannot reliably replace a version
      # substring embedded in a URL: the inline regex greedy-matches
      # "%40<digits>" and strips the encoded "@", and the jsonpath strategy
      # replaces the whole field. Patch the release PR directly via the
      # GraphQL createCommitOnBranch mutation so the resulting commit is
      # server-side signed (verified).
      - name: Resolve release PR branch
        id: sync-prep
        if: ${{ steps.release.outputs.pr }}
        env:
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          echo "branch=$(jq -r '.headBranchName' <<<"$PR_JSON")" >> "$GITHUB_OUTPUT"

      - name: Checkout release PR branch
        if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.sync-prep.outputs.branch }}
          token: ${{ steps.create-iat.outputs.token }}
          path: _sync

      - name: Sync plugin-manifest-validator schema URLs
        if: ${{ steps.release.outputs.pr }}
        working-directory: _sync
        env:
          GH_TOKEN: ${{ steps.create-iat.outputs.token }}
          BRANCH: ${{ steps.sync-prep.outputs.branch }}
          REPO_NWO: ${{ github.repository }}
        run: |
          set -euo pipefail
          new_version=$(jq -r '."packages/plugin-manifest-validator"' .release-please-manifest.json)
          targets=(
            "packages/plugin-manifest-validator/examples/manifest.json"
            "packages/plugin-manifest-validator/README.md"
          )

          additions='[]'
          for f in "${targets[@]}"; do
            sed -i -E "s|(plugin-manifest-validator%40)[0-9]+\.[0-9]+\.[0-9]+|\1${new_version}|g" "$f"
            if ! git diff --quiet -- "$f"; then
              additions=$(jq --arg path "$f" --arg content "$(base64 -w0 "$f")" \
                '. + [{path: $path, contents: $content}]' <<<"$additions")
            fi
          done

          if [[ "$(jq 'length' <<<"$additions")" == "0" ]]; then
            echo "URLs already point to ${new_version}; nothing to sync"
            exit 0
          fi

          jq -n \
            --arg repo "$REPO_NWO" \
            --arg branch "$BRANCH" \
            --arg msg "chore: sync plugin-manifest-validator schema URLs to ${new_version}" \
            --arg oid "$(git rev-parse HEAD)" \
            --argjson additions "$additions" \
            '{
              branch: {repositoryNameWithOwner: $repo, branchName: $branch},
              message: {headline: $msg},
              fileChanges: {additions: $additions},
              expectedHeadOid: $oid
            }' > "${RUNNER_TEMP}/sync-input.json"

          gh api graphql \
            -F input=@"${RUNNER_TEMP}/sync-input.json" \
            -f query='mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { url } } }'

  publish:
    name: Publish to npm
    permissions:
      contents: read
      id-token: write # Required for OIDC authn and npm provenance
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.outputs.releases_created == 'true' }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"
        # To avoid setup-node cache failure.
        # ref. https://github.com/actions/setup-node/issues/1137
      - name: create pnpm cache directory
        shell: bash
        run: mkdir -vp $(pnpm store path --silent)

      - uses: flatt-security/setup-takumi-guard-npm@9a5d797c2085b6326d3a2985c08e3a114b9b88c1 # v1.1.1
        with:
          bot-id: ${{ !github.event.pull_request.head.repo.fork && secrets.TAKUMI_GUARD_BOT_ID || '' }}

      # Ensure npm 11.5.1 or later is installed
      # ref. https://docs.npmjs.com/trusted-publishers#github-actions-configuration
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm -r publish --access public --registry https://registry.npmjs.org/
        env:
          NPM_CONFIG_PROVENANCE: true

  actions-timeline:
    needs: [publish]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: Kesin11/actions-timeline@da70beff098ff89b15d279e8bf2f60519a8dadd7 # v2
